<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title>Access blocked</title>
    <style>
        :root { --bg:#0b0d10; --muted:#94a3b8; --text:#e5e7eb; --pill:#111827; --pill-border:#1f2937; }
        @media (prefers-color-scheme: light) {
          :root { --bg:#f9fafb; --muted:#6b7280; --text:#111827; --pill:#f3f4f6; --pill-border:#e5e7eb; }
          body { color: var(--text); }
          h1 { color:#0f172a !important; }
          .sub { color:#374151 !important; }
          .url { color:#111827 !important; border-color:#d1d5db !important; }
          .bar { background:#e5e7eb !important; }
        }
        * { box-sizing: border-box; }
        html, body { height: 100%; }
        body { margin:0; background:var(--bg); color:var(--text); font:14px/1.6 system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; display:flex; align-items:center; justify-content:center; }
        .wrap { width: min(720px, 92vw); padding: 0 16px; border:none; background: transparent; border-radius:0; box-shadow:none; text-align:center; }
        h1 { margin: 0 0 6px; font-size: 16px; font-weight: 700; letter-spacing:.2px; color:#e5e7eb; }
        .sub { margin: 0 0 14px; font-size: 13px; color: var(--muted); }
        .url { display:inline-block; max-width:100%; padding:8px 12px; border-radius:999px; border:1px solid var(--pill-border); background: var(--pill); color: var(--text); font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size:12px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .bar { height:1px; background:#111827; margin:16px 0 0; }
        .actions { margin-top: 12px; }
        .refresh { display:inline-block; font-size:12px; color:#93c5fd; background: transparent; border:1px solid #1f2937; padding:6px 10px; border-radius:999px; text-decoration:none; cursor:pointer; max-width:100%; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .refresh:hover { background:#0b1220; border-color:#1d4ed8; color:#bfdbfe; }
        @media (prefers-color-scheme: light) {
          .refresh { color:#1d4ed8; border-color:#c7d2fe; }
          .refresh:hover { background:#eef2ff; border-color:#93c5fd; color:#1e3a8a; }
          .bar { background:#e5e7eb; }
        }
        /* disable clicks until URL is bound */
        a[aria-disabled="true"] { pointer-events: none; opacity: .85; }
    </style>
</head>
<body>
    <div class="wrap" role="group" aria-label="Access blocked">
        <h1>Access blocked</h1>
        <p class="sub">You don't have permission to view this page.</p>
        <!-- <a id="blocked-url" class="url" href="" target="_self" rel="noopener" title="" aria-disabled="true"></a> -->
        <div class="actions"><a id="refresh-link" class="refresh" href="" target="_self" rel="noopener" aria-label="Open blocked URL" aria-disabled="true"></a></div>
    </div>

    <script defer src="assets/js/blocked-page.js"></script>
</body>
</html>
